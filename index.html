<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Economy - Barter Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #16a34a; --bg: #f8fafc; --text: #1e293b; --wa: #25d366; --accent: #3b82f6; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; }
        
        header { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; padding: 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; position: relative; }
        
        .nav-tools { position: absolute; right: 20px; top: 25px; }
        .noti-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px; border-radius: 50%; cursor: pointer; position: relative; }
        .noti-badge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; display: none; }
        
        .glass-card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.8rem; color: #64748b; }
        input, textarea, select { width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-family: inherit; }
        
        .btn { width: 100%; background: var(--primary); color: white; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-tukar { background: var(--accent); margin-top: 10px; }
        .btn-wa { background: var(--wa); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 10px; font-weight: 600; }
        .btn-cancel-barter { background: #64748b; margin-top: 5px; font-size: 11px; padding: 8px; }
        .btn-admin { padding: 6px 10px; font-size: 11px; border-radius: 6px; border: none; color: white; cursor: pointer; margin-right: 5px; margin-bottom: 5px; font-weight: 600; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #e2e8f0; transition: 0.3s; display: flex; flex-direction: column; }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-desc { font-size: 12px; color: #64748b; margin: 8px 0; background: #f1f5f9; padding: 8px; border-radius: 6px; min-height: 40px; }
        
        #noti-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 400px; margin: 50px auto; border-radius: 15px; padding: 20px; max-height: 70vh; overflow-y: auto; }
        
        #login-section, #user-section { display: none; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .st-pending { background: #fef3c7; color: #92400e; }
        .st-approved { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 style="margin:0; font-size: 20px;">RENUVA</h1>
            <div class="nav-tools">
                <button class="noti-btn" id="open-noti">
                    <i class="fas fa-bell"></i>
                    <span class="noti-badge" id="noti-count">0</span>
                </button>
            </div>
        </header>

        <div id="noti-modal">
            <div class="modal-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0">Permintaan Masuk</h3>
                    <button onclick="document.getElementById('noti-modal').style.display='none'" style="border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
                </div>
                <div id="noti-list"></div>
            </div>
        </div>

        <div id="login-section" class="glass-card" style="text-align: center;">
            <h3>Mulai Barter</h3>
            <button class="btn" id="btn-login">Masuk dengan Google</button>
        </div>

        <div id="user-section">
            <div class="glass-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                    <span style="font-size: 13px;">User: <b id="user-name"></b></span>
                    <button id="btn-logout" style="border:none; color:var(--danger); background:none; cursor:pointer; font-size:12px;">Keluar</button>
                </div>
                
                <div class="input-group"><label>Nama Barang</label><input type="text" id="nama-barang"></div>
                <div style="display:flex; gap:10px;">
                    <div class="input-group" style="flex:1;"><label>WA (Awali +62)</label><input type="number" id="no-wa"></div>
                    <div class="input-group" style="flex:1;"><label>Kelayakan (%)</label><input type="number" id="kelayakan"></div>
                </div>
                <div class="input-group"><label>Deskripsi Detail</label><textarea id="deskripsi" rows="2"></textarea></div>
                <div class="input-group"><label>Foto Barang</label><input type="file" id="foto-barang" accept="image/*"></div>
                <button class="btn" id="btn-upload">Tayangkan Barang</button>
            </div>
        </div>

        <h3 style="margin: 20px 0 15px; color: #334155;">Katalog Barang</h3>
        <div id="daftar-barang" class="card-grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtVjDAzMJ-Lb5ZsNK9AtMFTqXCl9YEqwA",
            authDomain: "green-economy-0a0bo5.firebaseapp.com",
            projectId: "green-economy-0a0bo5",
            storageBucket: "green-economy-0a0bo5.firebasestorage.app",
            messagingSenderId: "781399326900",
            appId: "1:781399326900:web:4a026d76616007361357e1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        
        // KONFIGURASI CLOUDINARY
        const CLOUDINARY_CLOUD_NAME = "dp6j4fedr";
        const CLOUDINARY_UPLOAD_PRESET = "my0xrrdm";
        const ADMIN_EMAIL = "denandaanggun165@gmail.com,reznov.c12@gmail.com"; 

        onAuthStateChanged(auth, (user) => {
            document.getElementById('login-section').style.display = user ? 'none' : 'block';
            document.getElementById('user-section').style.display = user ? 'block' : 'none';
            if (user) {
                document.getElementById('user-name').innerText = user.displayName;
                initNotifications(user.email);
            }
        });

        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        document.getElementById('btn-upload').onclick = async () => {
            const user = auth.currentUser;
            const file = document.getElementById('foto-barang').files[0];
            const btn = document.getElementById('btn-upload');
            if (!file || !document.getElementById('nama-barang').value) return alert("Isi data!");

            btn.disabled = true; btn.innerText = "Mengunggah...";
            try {
                // PROSES UPLOAD CLOUDINARY
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

                const resp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { 
                    method: "POST", 
                    body: formData 
                });
                const res = await resp.json();

                if (!res.secure_url) throw new Error("Gagal upload");

                await addDoc(collection(db, "barang_barter"), {
                    nama: document.getElementById('nama-barang').value,
                    deskripsi: document.getElementById('deskripsi').value,
                    wa: document.getElementById('no-wa').value,
                    foto: res.secure_url,
                    email: user.email,
                    owner: user.displayName,
                    kondisi: document.getElementById('kelayakan').value + "%",
                    status: "pending", 
                    waktu: serverTimestamp()
                });
                alert("Berhasil! Tunggu approval."); location.reload();
            } catch (e) { 
                alert("Gagal Upload! Cek pengaturan Security Cloudinary."); 
                console.error(e);
                btn.disabled = false; 
                btn.innerText = "Tayangkan Barang";
            }
        };

        onSnapshot(query(collection(db, "barang_barter"), orderBy("waktu", "desc")), (snap) => {
            const container = document.getElementById('daftar-barang');
            container.innerHTML = "";
            const user = auth.currentUser;

            snap.forEach((sDoc) => {
                const d = sDoc.data();
                const id = sDoc.id;
                const isAdmin = user && user.email === ADMIN_EMAIL;
                const isOwner = user && user.email === d.email;
                const isApproved = d.status === "approved";

                if (!isApproved && !isOwner && !isAdmin) return;

                let actionHtml = "";
                if (isAdmin) {
                    if (!isApproved) actionHtml += `<button class="btn-admin" style="background:var(--primary)" onclick="window.updBarang('${id}','approved')">Approve</button>`;
                    else actionHtml += `<button class="btn-admin" style="background:var(--warning)" onclick="window.updBarang('${id}','pending')">Batal Approved</button>`;
                    actionHtml += `<button class="btn-admin" style="background:var(--danger)" onclick="window.delBarang('${id}')">Hapus Barang</button>`;
                } else if (isOwner) {
                    actionHtml += `<p style="color:#94a3b8; font-size:11px; font-style:italic">Status: ${d.status}</p>`;
                    actionHtml += `<button class="btn-admin" style="background:var(--danger); width:100%;" onclick="window.delBarang('${id}')">Hapus Barang Saya</button>`;
                } else {
                    actionHtml = `<div id="action-zone-${id}"><button class="btn btn-tukar" onclick="window.ajakTukar('${id}', '${d.email}', '${d.nama}')">Ajak Tukar</button></div>`;
                }

                container.innerHTML += `
                    <div class="card">
                        <img src="${d.foto}" class="card-img">
                        <div class="card-body">
                            <span class="badge ${isApproved ? 'st-approved' : 'st-pending'}">${d.status}</span>
                            <h4 style="margin:5px 0">${d.nama}</h4>
                            <p style="font-size:11px; color:#64748b">Oleh: ${d.owner}</p>
                            <div class="card-desc">${d.deskripsi || 'No Desc'}</div>
                            <div id="action-${id}">${actionHtml}</div>
                        </div>
                    </div>
                `;

                onSnapshot(query(collection(db, "permintaan_tukar"), where("id_barang", "==", id), where("status", "==", "accepted")), (tSnap) => {
                    tSnap.forEach(tDoc => {
                        const tData = tDoc.data();
                        const tId = tDoc.id;
                        if(user && (user.email === tData.pengajak || user.email === tData.pemilik_asal)) {
                            const waLink = `https://wa.me/${d.wa}?text=Deal%20Barter!`;
                            const target = document.getElementById(`action-${id}`);
                            if(target) target.innerHTML = `
                                <a href="${waLink}" target="_blank" class="btn-wa">Chat WA (Deal!)</a>
                                <button class="btn btn-cancel-barter" onclick="window.cancelBarter('${tId}')">Batalkan Barter Ini</button>
                                ${isOwner || isAdmin ? `<button class="btn-admin" style="background:var(--danger); width:100%; margin-top:5px;" onclick="window.delBarang('${id}')">Hapus Barang</button>` : ''}
                            `;
                        }
                    });
                });
            });
        });

        window.ajakTukar = async (id, email, nama) => {
            const user = auth.currentUser;
            if(!user) return alert("Login!");
            const q = query(collection(db, "barang_barter"), where("email", "==", user.email));
            const userGoods = await getDocs(q);
            if(userGoods.empty) return alert("Upload barang dulu!");
            
            if(confirm("Kirim ajakan barter?")) {
                await addDoc(collection(db, "permintaan_tukar"), {
                    id_barang: id, nama_barang: nama,
                    pengajak: user.email, nama_pengajak: user.displayName,
                    pemilik_asal: email, status: "pending", waktu: serverTimestamp()
                });
                alert("Terkirim!");
            }
        };

        window.cancelBarter = async (idReq) => {
            if(confirm("Apakah Anda yakin ingin membatalkan jabat tangan barter ini? Tombol WA akan hilang kembali.")) {
                await deleteDoc(doc(db, "permintaan_tukar", idReq));
                alert("Barter dibatalkan.");
            }
        };

        function initNotifications(email) {
            const q = query(collection(db, "permintaan_tukar"), where("pemilik_asal", "==", email), where("status", "==", "pending"));
            onSnapshot(q, (snap) => {
                document.getElementById('noti-count').innerText = snap.size;
                document.getElementById('noti-count').style.display = snap.size > 0 ? 'block' : 'none';
                const list = document.getElementById('noti-list');
                list.innerHTML = snap.empty ? "<p>Kosong.</p>" : "";
                snap.forEach(sDoc => {
                    const d = sDoc.data();
                    list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee">
                        <p style="font-size:13px"><b>${d.nama_pengajak}</b> ingin barter.</p>
                        <button class="btn" style="padding:5px" onclick="window.accTukar('${sDoc.id}')">Terima</button>
                    </div>`;
                });
            });
        }

        window.accTukar = async (id) => {
            await updateDoc(doc(db, "permintaan_tukar", id), { status: "accepted" });
            alert("Deal!"); document.getElementById('noti-modal').style.display = 'none';
        };

        window.updBarang = async (id, s) => await updateDoc(doc(db, "barang_barter", id), { status: s });
        window.delBarang = async (id) => { if(confirm("Hapus barang permanen?")) await deleteDoc(doc(db, "barang_barter", id)); };
        document.getElementById('open-noti').onclick = () => document.getElementById('noti-modal').style.display = 'block';
    </script>
</body>
</html>
